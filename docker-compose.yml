version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cotton_api
    ports:
      - "8000:8000"
    volumes:
      # Mount the data directory so the index is accessible
      - ./data:/app/data
      # Mount configs
      - ./configs:/app/configs
      # Mount logs
      - ./logs:/app/logs
    environment:
      - COTTON_RUNTIME=configs/runtime/openai.yaml
      # Pass through OpenAI key if present in host env, or set it in .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: cotton_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Database password required}
      - POSTGRES_DB=${POSTGRES_DB:-knowledge_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
