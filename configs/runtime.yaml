# configs/runtime.yaml
# Master runtime configuration for the Knowledge Hub pipeline.
# - Switch orchestrators between native and LangChain via 'orchestrator'.
# - Update adapters/models here instead of touching source code.
# - Retriever options (filters, multi-query, compression) live under 'retrieval'.
# - LangChain-specific toggles (tracing, streaming callbacks) live under 'langchain'.

orchestrator: langchain            # choose between "langchain" or "native"

embedder:
  adapter: openai
  model: text-embedding-3-small
  batch_size: 128
  normalize: true                  # keep cosine similarity behaviour

vector_store:
  adapter: faiss_local
  path: data/embeddings/vectors.faiss
  ids:  data/embeddings/ids.npy
  meta: data/staging/chunks.jsonl
  factory: IVF1024,Flat               # Optional FAISS factory string (e.g. IVF4096,Flat)

reranker:
  adapter: bge_reranker            # or "none"
  model: BAAI/bge-reranker-base
  topn: 20                         # number of candidates to rerank per query
  batch_size: 16                   # cross-encoder batch size
  max_length: 256                  # token max length for reranker inputs
  device: null                     # e.g. "cuda", "cpu", or null for auto

llm:
  adapter: ollama                  # set to "openai" if you like invoices
  model: llama3.1:8b      # must match what you `ollama pull`
  temperature: 0.2
  max_output_tokens: 1500

retrieval:
  k: 6
  mode: dense                      # dense | bm25 | hybrid (your store decides)
  rerank: false
  max_preview_chars: 2400          # stitching window for previews
  max_snippet_chars: 1600          # prompt snippet length
  neighbors: 1                     # stitched neighbours on each side (FAISS + LC)
  per_doc: 4                       # max results per document (set 0 to disable)
  diversify_per_doc: true          # enforce per-doc diversification in LangChain
  filters:
    year_min: 2019
    year_max: 2025
    # add other keys your store supports, e.g. contains, neighbors, per_doc

  use_multiquery: false
  use_compression: false

langchain:
  trace: true
  stream: false
