# configs/ingestion/azure_postgres.yaml
# Ingestion config for Azure Document Intelligence + PostgreSQL

seed_urls: []  # Not used - we process local PDFs

include_patterns:
  - '\.pdf$'

parser: azure  # Uses Azure Document Intelligence

storage:
  type: postgres
  table_name: chunks

embedder:
  provider: openai
  model: text-embedding-3-small

# Hybrid semantic chunking config (Option C)
chunking:
  strategy: semantic_per_page
  max_tokens: 600        # Smaller chunks for better retrieval
  overlap: 100           # Sentence overlap
  min_chunk_tokens: 50   # Skip tiny chunks

output:
  jsonl: "data/staging/azure_chunks.jsonl"
  csv: "data/staging/azure_index.csv"

download_dir: "data/raw_ingest"  # Test subset (36 PDFs)

limit: 40  # Process up to 40 PDFs

