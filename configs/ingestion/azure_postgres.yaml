# configs/ingestion/azure_postgres.yaml
# Ingestion config for Azure Document Intelligence + PostgreSQL

seed_urls:
  - "https://www.insidecotton.com/search?search_api_fulltext=&category=2024+Final+Reports+%28266423%29"
  - "https://www.insidecotton.com/search?search_api_fulltext=&category=2023+Final+Reports+%28266358%29"

include_patterns:
  - '\.pdf$'

parser: azure  # Uses Azure Document Intelligence

storage:
  type: postgres
  table_name: chunks

embedder:
  provider: openai
  model: text-embedding-3-small

output:
  jsonl: "data/staging/azure_chunks.jsonl"
  csv: "data/staging/azure_index.csv"

download_dir: "data/raw"

limit: 15
