# Production config for running the Knowledge Hub with OpenAI embeddings
# and LangChain orchestration. Point COTTON_RUNTIME at this file to enable it.
#
# PRODUCTION MODELS (upgraded 2024-12):
#   - Embedding: text-embedding-3-large (3072 dims, best retrieval quality)
#   - LLM: gpt-4o (best reasoning and answer quality)

orchestrator: langchain

embedder:
  adapter: openai
  model: text-embedding-3-large  
  batch_size: 256
  normalize: true
  max_retries: 5
  retry_backoff: 2.0

vector_store:
  type: postgres
  table_name: chunks

reranker:
  adapter: openai_reranker
  model: text-embedding-3-large
  topn: 20
  truncate_chars: 1200
  max_retries: 5
  retry_backoff: 2.0

llm:
  adapter: openai
  model: gpt-4o  #
  temperature: 0.2
  max_output_tokens: 1000  
  max_retries: 3
  timeout: 60

retrieval:
  k: 6
  mode: dense
  rerank: true
  neighbors: 1
  per_doc: 4
  diversify_per_doc: true
  max_preview_chars: 2400
  max_snippet_chars: 1600
  filters: {}
  use_multiquery: false
  use_compression: false

langchain:
  trace: true
  stream: true
  use_chat_openai: true
  chat_openai:
    model: gpt-4o  
    temperature: 0.2
    max_output_tokens: 1000
    max_retries: 3
    timeout: 60
